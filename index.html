<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset = "UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Calculator</title>

    </head> 
    <body>
        
        <div class="container">
            <h3>Calculate anything you want....</h3>
            <div class="cals-text">
                <p id="user-input">0</p>
            </div>
            <div class="cals-keys">
                <button class="key-others operation">AC</button>
                <button class="key-others operation">DEL</button>
                <button class="key-others operation">%</button>
                <button class="key-operate operations">/</button>
                <button class="key-numbers">7</button>
                <button class="key-numbers">8</button>
                <button class="key-numbers">9</button>
                <button class="key-operate operations">*</button>
                <button class="key-numbers">4</button>
                <button class="key-numbers">5</button>
                <button class="key-numbers">6</button>
                <button class="key-operate operations">-</button>
                <button class="key-numbers">1</button>
                <button class="key-numbers">2</button>
                <button class="key-numbers">3</button>
                <button class="key-operate operations">+</button>
                <button class="key-zero">0</button>
                <button class="key-numbers">.</button>
                <button class="key-operate operations">=</button>

            </div>
        
    </body>
    <script src="script.js"></script>
</html>
